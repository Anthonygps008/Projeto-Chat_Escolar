<!DOCTYPE html>
<html lang="pt-br">

            <tr>
                <td>Português</td>
                <td class="nota-media">6.5</td>
                <td class="recuperacao">Recuperação</td>
            </tr>

            <tr>
                <td>História</td>
                <td class="nota-alta">9.0</td>
                <td class="aprovado">Aprovado</td>
            </tr>

            <tr>
                <td>Ciências</td>
                <td class="nota-baixa">5.0</td>
                <td class="reprovado">Reprovado</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
